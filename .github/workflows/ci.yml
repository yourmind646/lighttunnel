name: Build and test

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  linux:
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes \
            build-essential \
            libarchive-tools \
            libgl1-mesa-dev \
            qt6-base-dev \
            qt6-base-dev-tools

      - name: Build
        run: ./scripts/build.sh

      - name: Test
        run: ./scripts/test.sh
